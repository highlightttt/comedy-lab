<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Click Test</title>
<style>
body{background:#111;color:#eee;font-family:sans-serif;padding:2rem}
.fb-wrap{display:inline-flex;gap:4px;margin-left:8px}
.fb-btn{background:none;border:1px solid #444;border-radius:6px;cursor:pointer;font-size:1.2rem;padding:4px 10px}
.fb-btn:hover{border-color:#ff6b35}
.fb-btn.active-up{background:rgba(48,209,88,0.15);border-color:#30d158}
.fb-btn.active-down{background:rgba(255,59,48,0.15);border-color:#ff3b30}
</style>
</head><body>
<h2>Feedback Click Test</h2>
<p>Click any button below. If it works, a popup will appear.</p>

<div style="padding:1rem 0">
  Test joke: The office microwave is just a Chinese restaurant nobody asked for.
  <span class="fb-wrap" data-jid="test-1">
    <button class="fb-btn" data-vote="up" onclick="vote(this)">👍</button>
    <button class="fb-btn" data-vote="down" onclick="vote(this)">👎</button>
  </span>
</div>

<div id="result" style="margin-top:2rem;color:#30d158"></div>

<script>
function vote(btn) {
  var wrap = btn.closest('.fb-wrap');
  var jid = wrap.dataset.jid;
  var v = btn.dataset.vote;
  document.getElementById('result').textContent = 'CLICKED! jid=' + jid + ' vote=' + v + ' at ' + new Date().toISOString();
  btn.classList.add(v === 'up' ? 'active-up' : 'active-down');
}
</script>
</body></html>
